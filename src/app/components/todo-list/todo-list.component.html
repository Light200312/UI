<div class="todo-container">
  <!-- Header -->
  <div class="header">
    <h1>📝 My Todo App</h1>
    <button class="btn btn-primary" (click)="openAddForm()">+ Add New Task</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Total:</span>
      <span class="stat-value">{{ getTotalCount() }}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Pending:</span>
      <span class="stat-value pending">{{ getPendingCount() }}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Completed:</span>
      <span class="stat-value completed">{{ getCompletedCount() }}</span>
    </div>
  </div>

  <!-- Filters Section -->
  <div class="filters-section">
    <div class="filter-group">
      <input 
        type="text" 
        placeholder="🔍 Search tasks..." 
        [(ngModel)]="searchQuery"
        (input)="onFilterChange()"
        class="search-input"
      />
    </div>

    <div class="filter-row">
      <div class="filter-group">
        <label>Status:</label>
        <select [(ngModel)]="filterStatus" (change)="onFilterChange()" class="filter-select">
          <option value="all">All Tasks</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Priority:</label>
        <select [(ngModel)]="filterPriority" (change)="onFilterChange()" class="filter-select">
          <option value="all">All Priorities</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Category:</label>
        <select [(ngModel)]="filterCategory" (change)="onFilterChange()" class="filter-select">
          <option value="all">All Categories</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Sort By:</label>
        <select [(ngModel)]="sortBy" (change)="onSortChange()" class="filter-select">
          <option value="createdAt">Newest First</option>
          <option value="dueDate">Due Date</option>
          <option value="priority">Priority</option>
        </select>
      </div>
    </div>

    <div *ngIf="getCompletedCount() > 0" class="clear-completed">
      <button class="btn btn-secondary" (click)="clearCompletedTasks()">Clear Completed Tasks</button>
    </div>
  </div>

  <!-- Add/Edit Form -->
  <app-todo-form 
    *ngIf="showForm"
    [task]="editingTask"
    (onSave)="onTaskSaved()"
    (onCancel)="closeForm()"
  ></app-todo-form>

  <!-- Tasks List -->
  <div class="tasks-section">
    <div *ngIf="filteredTasks.length === 0" class="empty-state">
      <p>✨ No tasks found. Create one to get started!</p>
    </div>

    <div *ngIf="filteredTasks.length > 0" class="tasks-list">
      <app-todo-item 
        *ngFor="let task of filteredTasks" 
        [task]="task"
        (onToggle)="toggleTask($event)"
        (onEdit)="openEditForm($event)"
        (onDelete)="deleteTask($event)"
      ></app-todo-item>
    </div>
  </div>
</div>
