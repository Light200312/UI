<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-copy">
      <p class="eyebrow">Personal workspace</p>
      <h1>Keep your todos private and synced to your account.</h1>
      <p class="supporting">
        Register once, then sign in anytime to manage your own task list without mixing it with anyone else’s.
      </p>
    </div>

    <div class="auth-panel">
      <div class="mode-switch">
        <button type="button" [class.active]="mode === 'login'" (click)="setMode('login')">Login</button>
        <button type="button" [class.active]="mode === 'register'" (click)="setMode('register')">Register</button>
      </div>

      <form class="auth-form" (ngSubmit)="submit()">
        <div *ngIf="mode === 'register'" class="form-group">
          <label for="name">Name</label>
          <input id="name" name="name" [(ngModel)]="form.name" type="text" placeholder="Your name" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" [(ngModel)]="form.email" type="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" [(ngModel)]="form.password" type="password" placeholder="Minimum 6 characters" />
        </div>

        <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

        <button type="submit" class="submit-btn" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Please wait...' : (mode === 'login' ? 'Login to Todo App' : 'Create Account') }}
        </button>
      </form>
    </div>
  </div>
</section>
